<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>

</head>

<body>

<div class="container-fluid h-100">
    <div class="row justify-content-center h-100">

        <div class="col-12 col-md-10 col-lg-8 col-xl-6 chat">

            <div class="card shadow-lg">

                <!-- HEADER -->
                <div class="card-header msg_head">
                    <div class="d-flex align-items-center">

                        <div class="img_cont">
                            <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="user_img">
                            <span class="online_icon"></span>
                        </div>

                        <div class="user_info ml-3">
                            <span>Medical Assistant</span>
                            <p>Online • Ask your health queries</p>
                        </div>

                    </div>
                </div>

                <!-- CHAT BODY -->
                <div id="messageFormeight" class="card-body msg_card_body"></div>

                <!-- INPUT -->
                <div class="card-footer">
                    <form id="messageArea" class="input-group">

                        <input type="text"
                               id="text"
                               name="msg"
                               placeholder="Describe your symptoms..."
                               autocomplete="off"
                               class="form-control type_msg"
                               required/>

                        <div class="input-group-append">
                            <button type="submit" id="send" class="input-group-text send_btn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>

                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

<script>

    function scrollToBottom() {
        var chatBody = document.getElementById("messageFormeight");
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    $(document).ready(function () {

        $("#messageArea").on("submit", function (event) {

            const date = new Date();
            const str_time = date.getHours() + ":" + date.getMinutes();

            var rawText = $("#text").val();

            // USER MESSAGE
            var userHtml = `
            <div class="d-flex justify-content-end mb-3">
                <div class="msg_cotainer_send">
                    ${rawText}
                    <span class="msg_time_send">${str_time}</span>
                </div>
            </div>`;

            $("#text").val("");
            $("#messageFormeight").append(userHtml);
            scrollToBottom();

            // TYPING EFFECT
            var typingHtml = `<div id="typing" class="text-muted mb-2">Doctor is typing...</div>`;
            $("#messageFormeight").append(typingHtml);
            scrollToBottom();

            // AJAX CALL
            $.ajax({
                data: { msg: rawText },
                type: "POST",
                url: "/get",
            }).done(function (data) {

                $("#typing").remove();

                var botHtml = `
                <div class="d-flex justify-content-start mb-3">
                    <div class="msg_cotainer">
                        ${data}
                        <span class="msg_time">${str_time}</span>
                    </div>
                </div>`;

                $("#messageFormeight").append(botHtml);
                scrollToBottom();
            });

            event.preventDefault();
        });
    });

</script>

</body>
</html>
